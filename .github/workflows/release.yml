name: Release Build

permissions:
  contents: write

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build and Release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all extensions
        run: node build.js

      - name: Get version and commit
        id: get_meta
        run: |
          VERSION=$(node -e "const m=require('./manifest.json'); console.log(m.version.replace(/\\./g,'_'));")
          SHORT_SHA=$(git rev-parse --short=7 HEAD)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          echo "tag=commit-$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Generate release notes
        run: |
          cat <<EOF > release_notes.md
          steamdb_ext_${{ steps.get_meta.outputs.version }}.zip：Chrome/Chromium系向け
          steamdb_ext_${{ steps.get_meta.outputs.version }}_edge.zip：Microsoft Edge向け
          steamdb_ext_${{ steps.get_meta.outputs.version }}_brave.zip：Brave向け
          steamdb_ext_${{ steps.get_meta.outputs.version }}_firefox.zip：Firefox向け
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_meta.outputs.tag }}
          name: Commit ${{ steps.get_meta.outputs.short_sha }}
          body_path: release_notes.md
          files: |
            steamdb_ext_${{ steps.get_meta.outputs.version }}.zip
            steamdb_ext_${{ steps.get_meta.outputs.version }}_edge.zip
            steamdb_ext_${{ steps.get_meta.outputs.version }}_brave.zip
            steamdb_ext_${{ steps.get_meta.outputs.version }}_firefox.zip
