name: Release Build

permissions:
  contents: write

on:
  release:
    types: [published]

jobs:
  build:
    name: Build Extensions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all extensions
        run: node build.js

      - name: Get version from manifest
        id: get_version
        run: |
          VERSION=$(node -e "const m=require('./manifest.json'); console.log(m.version.replace(/\./g,'_'));")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Upload Chrome extension
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./steamdb_ext_${{ steps.get_version.outputs.version }}.zip
          asset_name: steamdb_ext_${{ steps.get_version.outputs.version }}_chrome.zip
          asset_content_type: application/zip

      - name: Upload Edge extension
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./steamdb_ext_${{ steps.get_version.outputs.version }}_edge.zip
          asset_name: steamdb_ext_${{ steps.get_version.outputs.version }}_edge.zip
          asset_content_type: application/zip

      - name: Upload Firefox extension
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ github.event.release.upload_url }}
          asset_path: ./steamdb_ext_${{ steps.get_version.outputs.version }}_firefox.zip
          asset_name: steamdb_ext_${{ steps.get_version.outputs.version }}_firefox.zip
          asset_content_type: application/zip
